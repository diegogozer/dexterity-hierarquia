<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hierarquia de Resultado — Dexterity IT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --bg2: #F2F1ED;
    --bg3: #E8E7E3;
    --text: #1A1A18;
    --text2: #6B6A65;
    --text3: #9C9B95;
    --border: rgba(0,0,0,.08);
    --border-h: rgba(0,0,0,.14);
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --rev: #0A7B5A;
    --rev-bg: #E6F5EE;
    --rev-border: #B2E0CC;
    --exp: #C24422;
    --exp-bg: #FDF0EC;
    --exp-border: #F0C4B3;
    --seg: #5B4FC7;
    --seg-bg: #EEEDFE;
    --seg-border: #CECBF6;
    --pl: #1565A8;
    --pl-bg: #E6F1FB;
    --pl-border: #B5D4F4;
    --cc: #9D6B15;
    --cc-bg: #FDF5E6;
    --cc-border: #F0D9A0;
    --dept: #A13762;
    --dept-bg: #FBEAF0;
    --dept-border: #F4C0D1;
    --proc: #5F5E5A;
    --proc-bg: #F1EFE8;
    --proc-border: #D3D1C7;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 2px 8px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161615;
      --bg2: #1E1E1C;
      --bg3: #2A2A27;
      --text: #E8E7E3;
      --text2: #9C9B95;
      --text3: #6B6A65;
      --border: rgba(255,255,255,.08);
      --border-h: rgba(255,255,255,.14);
      --rev: #5DCAA5;
      --rev-bg: #0D2E23;
      --rev-border: #1A4A38;
      --exp: #F0997B;
      --exp-bg: #2E1810;
      --exp-border: #4A2B1C;
      --seg: #AFA9EC;
      --seg-bg: #1E1B3A;
      --seg-border: #332E5C;
      --pl: #85B7EB;
      --pl-bg: #0C1E30;
      --pl-border: #1A3650;
      --cc: #FAC775;
      --cc-bg: #2A1E08;
      --cc-border: #4A3510;
      --dept: #ED93B1;
      --dept-bg: #2E1520;
      --dept-border: #4A2535;
      --proc: #B4B2A9;
      --proc-bg: #252523;
      --proc-border: #3A3A37;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 2px 8px rgba(0,0,0,.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .header {
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.3px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    color: var(--text2);
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .toolbar button {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
  }
  .toolbar button:hover {
    background: var(--bg3);
    color: var(--text);
    border-color: var(--border-h);
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    stroke: var(--text3);
  }
  .search-wrap input {
    width: 100%;
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 12px 7px 34px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    outline: none;
    transition: border .15s;
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--border-h); }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text2);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .tree-container {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 8px;
    box-shadow: var(--shadow-sm);
  }
  .node { margin-left: 0; }
  .node .node { margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border); }
  .node-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .12s;
    user-select: none;
    position: relative;
  }
  .node-header:hover { background: var(--bg3); }
  .node-header.highlighted { background: rgba(93,202,165,.12); }
  .node-header.root-node {
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 4px;
    box-shadow: var(--shadow-sm);
  }
  .chevron {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s ease;
    color: var(--text3);
  }
  .chevron.open { transform: rotate(90deg); }
  .chevron.empty { opacity: 0; pointer-events: none; }
  .chevron svg { width: 12px; height: 12px; }
  .node-label {
    font-size: 14px;
    font-weight: 400;
    flex: 1;
    min-width: 0;
  }
  .node-header.root-node .node-label { font-weight: 500; font-size: 15px; }
  .node-label .sub {
    font-size: 12px;
    color: var(--text3);
    margin-left: 6px;
    font-weight: 300;
  }
  .code-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: var(--bg);
    padding: 1px 7px;
    border-radius: 5px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 1px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .3px;
    text-transform: uppercase;
    flex-shrink: 0;
    border: 1px solid transparent;
  }
  .badge-rev { color: var(--rev); background: var(--rev-bg); border-color: var(--rev-border); }
  .badge-exp { color: var(--exp); background: var(--exp-bg); border-color: var(--exp-border); }
  .badge-seg { color: var(--seg); background: var(--seg-bg); border-color: var(--seg-border); }
  .badge-pl { color: var(--pl); background: var(--pl-bg); border-color: var(--pl-border); }
  .badge-cc { color: var(--cc); background: var(--cc-bg); border-color: var(--cc-border); }
  .badge-dept { color: var(--dept); background: var(--dept-bg); border-color: var(--dept-border); }
  .badge-proc { color: var(--proc); background: var(--proc-bg); border-color: var(--proc-border); }
  .children-wrap {
    overflow: hidden;
    transition: max-height .28s cubic-bezier(.4,0,.2,1), opacity .2s;
  }
  .children-wrap.collapsed { max-height: 0 !important; opacity: 0; }
  .count-tag {
    font-size: 11px;
    color: var(--text3);
    margin-left: 4px;
  }
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1;
    min-width: 120px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -.5px;
  }
  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .stat-card.rev .stat-value { color: var(--rev); }
  .stat-card.exp .stat-value { color: var(--exp); }
  .stat-card.seg .stat-value { color: var(--seg); }
  .stat-card.dept .stat-value { color: var(--dept); }
  .no-results {
    text-align: center;
    padding: 32px 16px;
    color: var(--text3);
    font-size: 14px;
  }
  @media (max-width: 600px) {
    .app { padding: 20px 14px; }
    .header h1 { font-size: 18px; }
    .stats { gap: 10px; }
    .stat-card { min-width: 80px; padding: 10px 12px; }
    .stat-card .stat-value { font-size: 20px; }
    .node .node { margin-left: 8px; padding-left: 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Hierarquia de resultado</h1>
    <p>Dexterity IT — Estrutura de receitas, despesas e departamentos</p>
  </div>
  <div class="stats">
    <div class="stat-card seg"><div class="stat-value">5</div><div class="stat-label">Segmentos</div></div>
    <div class="stat-card rev"><div class="stat-value">6</div><div class="stat-label">Centros de lucro</div></div>
    <div class="stat-card exp"><div class="stat-value">18</div><div class="stat-label">Centros de custo</div></div>
    <div class="stat-card dept"><div class="stat-value">7</div><div class="stat-label">Departamentos</div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar por nome ou código..." autocomplete="off">
    </div>
    <button onclick="expandAll()">Expandir tudo</button>
    <button onclick="collapseAll()">Recolher tudo</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--seg)"></div>Segmento</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pl)"></div>Centro de lucro</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cc)"></div>Centro de custo</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--dept)"></div>Departamento</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--proc)"></div>Processo</div>
  </div>
  <div class="tree-container" id="tree"></div>
</div>

<script>
const data = {
  label: "Resultado Dexterity IT", badge: null, root: true, open: true,
  children: [
    { label: "Receitas", badge: "rev", open: true, children: [
      { label: "Segmentos de negócio", open: true, children: [
        { label: "TRM", sub: "Treasury Risk Management", badge: "seg" },
        { label: "CLM", sub: "Cash Liquidity Management", badge: "seg" },
        { label: "MRA", sub: "Market Risk Analyzer", badge: "seg" },
        { label: "Integrações", sub: "Interfaces e desenvolvimentos", badge: "seg" },
        { label: "CTRM", sub: "Commodity Trade Risk Management", badge: "seg" },
      ]},
      { label: "Centros de lucro", open: true, children: [
        { label: "Projetos escopo aberto", code: "1000", badge: "pl" },
        { label: "Projetos escopo fechado", code: "1010", badge: "pl" },
        { label: "AMS", code: "1020", badge: "pl" },
        { label: "Vendas diretas", code: "1030", badge: "pl" },
        { label: "Parcerias / Outsourcing", code: "1040", badge: "pl" },
        { label: "Treinamentos e workshops", code: "1050", badge: "pl" },
      ]},
    ]},
    { label: "Despesas", badge: "exp", open: true, children: [
      { label: "Centros de custo", open: false, children: [
        { label: "Comercial & Relacionamento", code: "2000", badge: "cc" },
        { label: "Administrativo & Compliance", code: "2010", badge: "cc" },
        { label: "Tecnologia", code: "2020", badge: "cc" },
        { label: "Infraestrutura", code: "2030", badge: "cc" },
        { label: "Governança & Estratégia", code: "2040", badge: "cc" },
        { label: "Financeiro", code: "2050", badge: "cc" },
        { label: "Projetos & Entregas", code: "2060", badge: "cc" },
        { label: "Pessoas & Cultura", code: "2070", badge: "cc" },
        { label: "Inovação & Melhoria", code: "2080", badge: "cc" },
        { label: "Específico cliente", code: "2090", badge: "cc" },
        { label: "Marketing", code: "2100", badge: "cc" },
        { label: "P&D / Inovação", code: "3000", badge: "cc" },
        { label: "Capacitação interna", code: "3010", badge: "cc" },
        { label: "Onboarding / Treinamento", code: "3020", badge: "cc" },
        { label: "Receitas financeiras", code: "4000", badge: "cc" },
        { label: "Despesas financeiras", code: "4010", badge: "cc" },
        { label: "Diego Gozer", code: "5000", badge: "cc" },
        { label: "Marcelo", code: "5010", badge: "cc" },
      ]},
      { label: "Departamentos", open: false, children: [
        { label: "Comercial & Relacionamento", badge: "dept", children: [
          { label: "Gestão de pipeline de vendas", badge: "proc" },
          { label: "Elaboração e aprovação de propostas", badge: "proc" },
          { label: "Onboarding de novos clientes", badge: "proc" },
          { label: "Gestão de contratos comerciais", badge: "proc" },
        ]},
        { label: "Projetos & Entregas", badge: "dept", children: [
          { label: "Metodologia de projeto", badge: "proc" },
          { label: "Gestão de mudanças", badge: "proc" },
          { label: "Gestão de incidentes / AMS", badge: "proc" },
          { label: "Controle de qualidade / testes", badge: "proc" },
          { label: "Encerramento e lições aprendidas", badge: "proc" },
        ]},
        { label: "Financeiro", badge: "dept", children: [
          { label: "Faturamento e emissão de NF", badge: "proc" },
          { label: "Gestão de fluxo de caixa", badge: "proc" },
          { label: "Gestão de horas / projetos", badge: "proc" },
          { label: "Pagamentos e reembolsos", badge: "proc" },
          { label: "Fechamento mensal", badge: "proc" },
        ]},
        { label: "Pessoas & Cultura", badge: "dept", children: [
          { label: "Recrutamento & Seleção", badge: "proc" },
          { label: "Onboarding de colaboradores", badge: "proc" },
          { label: "Avaliação de desempenho", badge: "proc" },
          { label: "Plano de carreira / desenvolvimento", badge: "proc" },
          { label: "Offboarding", badge: "proc" },
        ]},
        { label: "Administrativo & Compliance", badge: "dept", children: [
          { label: "Gestão de contratos fornecedores", badge: "proc" },
          { label: "Compliance e políticas internas", badge: "proc" },
          { label: "Gestão documental", badge: "proc" },
          { label: "Compras e aquisições", badge: "proc" },
        ]},
        { label: "Inovação & Melhoria", badge: "dept", children: [
          { label: "Gestão de backlog de produtos", badge: "proc" },
          { label: "Prova de conceito / POCs", badge: "proc" },
          { label: "Documentação de lições aprendidas", badge: "proc" },
        ]},
        { label: "Governança & Estratégia", badge: "dept", children: [
          { label: "Planejamento estratégico anual", badge: "proc" },
          { label: "Revisão de indicadores mensais", badge: "proc" },
          { label: "Gestão de riscos corporativos", badge: "proc" },
          { label: "Comunicação interna", badge: "proc" },
        ]},
      ]},
    ]},
  ]
};

const badgeNames = { rev: 'Receita', exp: 'Despesa', seg: 'Segmento', pl: 'C. Lucro', cc: 'C. Custo', dept: 'Depto', proc: 'Processo' };
const chevronSvg = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>';

let allNodes = [];

function countChildren(node) {
  if (!node.children) return 0;
  return node.children.reduce((s, c) => s + 1 + countChildren(c), 0);
}

function renderNode(node, container, depth) {
  const div = document.createElement('div');
  div.className = 'node';
  const hasChildren = node.children && node.children.length > 0;

  const header = document.createElement('div');
  header.className = 'node-header' + (node.root ? ' root-node' : '');

  const chev = document.createElement('span');
  chev.className = 'chevron' + (hasChildren ? (node.open !== false ? ' open' : '') : ' empty');
  chev.innerHTML = chevronSvg;
  header.appendChild(chev);

  if (node.code) {
    const c = document.createElement('span');
    c.className = 'code-tag';
    c.textContent = node.code;
    header.appendChild(c);
  }

  const lbl = document.createElement('span');
  lbl.className = 'node-label';
  lbl.innerHTML = node.label + (node.sub ? '<span class="sub">— ' + node.sub + '</span>' : '');
  header.appendChild(lbl);

  if (hasChildren && !node.badge) {
    const ct = document.createElement('span');
    ct.className = 'count-tag';
    ct.textContent = '(' + node.children.length + ')';
    header.appendChild(ct);
  }

  if (node.badge) {
    const b = document.createElement('span');
    b.className = 'badge badge-' + node.badge;
    b.textContent = badgeNames[node.badge];
    header.appendChild(b);
  }

  div.appendChild(header);

  const nodeRef = { header, node, label: (node.label + ' ' + (node.sub || '') + ' ' + (node.code || '')).toLowerCase() };

  if (hasChildren) {
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'children-wrap' + (node.open === false ? ' collapsed' : '');
    node.children.forEach(c => renderNode(c, childrenDiv, depth + 1));
    div.appendChild(childrenDiv);
    nodeRef.childrenDiv = childrenDiv;
    nodeRef.chev = chev;

    header.addEventListener('click', () => {
      const isOpen = !childrenDiv.classList.contains('collapsed');
      if (isOpen) {
        childrenDiv.style.maxHeight = childrenDiv.scrollHeight + 'px';
        requestAnimationFrame(() => { childrenDiv.classList.add('collapsed'); });
      } else {
        childrenDiv.classList.remove('collapsed');
        childrenDiv.style.maxHeight = childrenDiv.scrollHeight + 'px';
        setTimeout(() => { childrenDiv.style.maxHeight = 'none'; }, 300);
      }
      chev.classList.toggle('open', !isOpen);
    });
  }

  allNodes.push(nodeRef);
  container.appendChild(div);
}

const treeEl = document.getElementById('tree');
renderNode(data, treeEl, 0);

function expandAll() {
  allNodes.forEach(n => {
    if (n.childrenDiv) {
      n.childrenDiv.classList.remove('collapsed');
      n.childrenDiv.style.maxHeight = 'none';
      n.chev.classList.add('open');
    }
  });
}

function collapseAll() {
  allNodes.forEach(n => {
    if (n.childrenDiv && !n.node.root) {
      n.childrenDiv.style.maxHeight = n.childrenDiv.scrollHeight + 'px';
      requestAnimationFrame(() => { n.childrenDiv.classList.add('collapsed'); });
      n.chev.classList.remove('open');
    }
  });
}

const searchInput = document.getElementById('search');
let debounce;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    const q = searchInput.value.toLowerCase().trim();
    allNodes.forEach(n => {
      if (q && n.label.includes(q)) {
        n.header.classList.add('highlighted');
      } else {
        n.header.classList.remove('highlighted');
      }
    });
    if (q) {
      allNodes.forEach(n => {
        if (n.childrenDiv && hasMatchInChildren(n.node, q)) {
          n.childrenDiv.classList.remove('collapsed');
          n.childrenDiv.style.maxHeight = 'none';
          n.chev.classList.add('open');
        }
      });
    }
  }, 180);
});

function hasMatchInChildren(node, q) {
  if (!node.children) return false;
  return node.children.some(c => {
    const text = (c.label + ' ' + (c.sub || '') + ' ' + (c.code || '')).toLowerCase();
    return text.includes(q) || hasMatchInChildren(c, q);
  });
}
</script>
</body>
</html>
